spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://cognito-idp.${aws.region}.amazonaws.com/${COGNITO_USER_POOL_ID}/.well-known/jwks.json
          issuer-uri: https://cognito-idp.${aws.region}.amazonaws.com/${COGNITO_USER_POOL_ID}

app:
  plan-catalog-service:
    url: http://plan-catalog-service:8082

logging:
  level:
    com.consumerordering: INFO
    software.amazon.awssdk: WARN
