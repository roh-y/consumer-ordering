name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: consumer-ordering-dev-cluster

jobs:
  # -------------------------------------------------------
  # Job 1: Detect which services changed
  # -------------------------------------------------------
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      backend-matrix: ${{ steps.matrix.outputs.matrix }}
      backend-any: ${{ steps.changes.outputs.user-service == 'true' || steps.changes.outputs.plan-catalog-service == 'true' || steps.changes.outputs.order-service == 'true' }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - name: Check changed paths
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            user-service:
              - 'services/user-service/**'
            plan-catalog-service:
              - 'services/plan-catalog-service/**'
            order-service:
              - 'services/order-service/**'
            frontend:
              - 'frontend/**'

      - name: Build dynamic backend matrix
        id: matrix
        run: |
          matrix='[]'
          if [ "${{ steps.changes.outputs.user-service }}" == "true" ]; then
            matrix=$(echo "$matrix" | jq -c '. + [{"service": "user-service", "path": "services/user-service"}]')
          fi
          if [ "${{ steps.changes.outputs.plan-catalog-service }}" == "true" ]; then
            matrix=$(echo "$matrix" | jq -c '. + [{"service": "plan-catalog-service", "path": "services/plan-catalog-service"}]')
          fi
          if [ "${{ steps.changes.outputs.order-service }}" == "true" ]; then
            matrix=$(echo "$matrix" | jq -c '. + [{"service": "order-service", "path": "services/order-service"}]')
          fi
          echo "matrix={\"include\":$matrix}" >> "$GITHUB_OUTPUT"
          echo "Generated matrix: $matrix"

  # -------------------------------------------------------
  # Job 2: Build & push backend Docker images
  # -------------------------------------------------------
  build-backend:
    name: "Build ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.backend-any == 'true' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.backend-matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/consumer-ordering-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.path }}
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/consumer-ordering-dev-${{ matrix.service }}:latest
            ${{ steps.ecr-login.outputs.registry }}/consumer-ordering-dev-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # -------------------------------------------------------
  # Job 3: Build & deploy frontend to S3/CloudFront
  # -------------------------------------------------------
  build-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.API_GATEWAY_ENDPOINT }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/consumer-ordering-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync hashed assets (immutable cache)
        run: |
          aws s3 sync frontend/dist/assets s3://${{ secrets.S3_FRONTEND_BUCKET }}/assets \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync remaining files (no-cache)
        run: |
          aws s3 sync frontend/dist s3://${{ secrets.S3_FRONTEND_BUCKET }} \
            --exclude "assets/*" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # -------------------------------------------------------
  # Job 4: Deploy backend services to ECS
  # -------------------------------------------------------
  deploy-backend:
    name: "Deploy ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: [detect-changes, build-backend]
    if: ${{ needs.detect-changes.outputs.backend-any == 'true' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.backend-matrix) }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/consumer-ordering-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service consumer-ordering-dev-${{ matrix.service }} \
            --force-new-deployment

  # -------------------------------------------------------
  # Job 5: Verify deployment
  # -------------------------------------------------------
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-backend, build-frontend]
    if: ${{ always() && needs.detect-changes.result == 'success' && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') && (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/consumer-ordering-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait for ECS services to stabilize
        if: ${{ needs.deploy-backend.result == 'success' }}
        run: |
          matrix='${{ needs.detect-changes.outputs.backend-matrix }}'
          services=$(echo "$matrix" | jq -r '.include[].service')
          for svc in $services; do
            echo "Waiting for $svc to stabilize..."
            aws ecs wait services-stable \
              --cluster ${{ env.ECS_CLUSTER }} \
              --services "consumer-ordering-dev-${svc}"
          done

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Branch:** \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend | ${{ needs.deploy-backend.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend | ${{ needs.build-frontend.result }} |" >> "$GITHUB_STEP_SUMMARY"
