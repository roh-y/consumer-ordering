# Full infrastructure + application deploy (one-click).
# For app-only deploys triggered by CI, see deploy.yml.

name: Deploy All

on:
  workflow_dispatch:
    inputs:
      skip_infra:
        description: 'Skip Terraform (app-only deploy)'
        type: boolean
        default: false

concurrency:
  group: deploy-all
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  PROJECT: consumer-ordering
  ENVIRONMENT: dev

jobs:
  # ---------------------------------------------------------
  # Job 1: Terraform apply
  # ---------------------------------------------------------
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_infra == false }}
    outputs:
      api_gateway_endpoint: ${{ steps.outputs.outputs.api_gateway_endpoint }}
      ecr_registry: ${{ steps.outputs.outputs.ecr_registry }}
      ecs_cluster_name: ${{ steps.outputs.outputs.ecs_cluster_name }}
      s3_frontend_bucket: ${{ steps.outputs.outputs.s3_frontend_bucket }}
      cloudfront_distribution_id: ${{ steps.outputs.outputs.cloudfront_distribution_id }}
      cloudfront_domain: ${{ steps.outputs.outputs.cloudfront_domain }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT }}-${{ env.ENVIRONMENT }}-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infrastructure
        run: terraform init

      - name: Terraform Apply
        working-directory: infrastructure
        run: terraform apply -auto-approve

      - name: Capture outputs
        id: outputs
        working-directory: infrastructure
        run: |
          echo "api_gateway_endpoint=$(terraform output -raw api_gateway_endpoint)" >> "$GITHUB_OUTPUT"
          echo "ecs_cluster_name=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "s3_frontend_bucket=$(terraform output -raw s3_frontend_bucket)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_domain=$(terraform output -raw cloudfront_domain)" >> "$GITHUB_OUTPUT"

          # Extract registry from first ECR URL (everything before the /)
          ecr_urls=$(terraform output -json ecr_repository_urls)
          registry=$(echo "$ecr_urls" | jq -r 'to_entries[0].value' | cut -d'/' -f1)
          echo "ecr_registry=${registry}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------
  # Job 2: Build & push backend Docker images
  # ---------------------------------------------------------
  build-backend:
    name: "Build ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: [terraform]
    if: ${{ always() && !failure() && !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - plan-catalog-service
          - order-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT }}-${{ env.ENVIRONMENT }}-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT }}-${{ env.ENVIRONMENT }}-${{ matrix.service }}:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT }}-${{ env.ENVIRONMENT }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ---------------------------------------------------------
  # Job 3: Build & deploy frontend
  # ---------------------------------------------------------
  build-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: [terraform]
    if: ${{ always() && !failure() && !cancelled() }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT }}-${{ env.ENVIRONMENT }}-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Get infra outputs from Terraform state
        id: infra
        working-directory: infrastructure
        run: |
          terraform init -input=false > /dev/null
          echo "s3_bucket=$(terraform output -raw s3_frontend_bucket)" >> "$GITHUB_OUTPUT"
          echo "cf_distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Sync hashed assets (immutable cache)
        run: |
          aws s3 sync frontend/dist/assets s3://${{ steps.infra.outputs.s3_bucket }}/assets \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync remaining files (no-cache)
        run: |
          aws s3 sync frontend/dist s3://${{ steps.infra.outputs.s3_bucket }} \
            --exclude "assets/*" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.infra.outputs.cf_distribution_id }} \
            --paths "/*"

  # ---------------------------------------------------------
  # Job 4: Force ECS redeployment
  # ---------------------------------------------------------
  deploy-backend:
    name: Deploy Backend Services
    runs-on: ubuntu-latest
    needs: [terraform, build-backend]
    if: ${{ always() && needs.build-backend.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - plan-catalog-service
          - order-service
          - notification-service
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT }}-${{ env.ENVIRONMENT }}-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine ECS cluster
        id: cluster
        run: |
          if [ -n "${{ needs.terraform.outputs.ecs_cluster_name }}" ]; then
            echo "name=${{ needs.terraform.outputs.ecs_cluster_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ env.PROJECT }}-${{ env.ENVIRONMENT }}-cluster" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy ${{ matrix.service }}
        run: |
          aws ecs update-service \
            --cluster ${{ steps.cluster.outputs.name }} \
            --service ${{ env.PROJECT }}-${{ env.ENVIRONMENT }}-${{ matrix.service }} \
            --force-new-deployment

  # ---------------------------------------------------------
  # Job 5: Verify deployment
  # ---------------------------------------------------------
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [terraform, deploy-backend, build-frontend]
    if: ${{ always() && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') && (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT }}-${{ env.ENVIRONMENT }}-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine ECS cluster
        id: cluster
        run: |
          if [ -n "${{ needs.terraform.outputs.ecs_cluster_name }}" ]; then
            echo "name=${{ needs.terraform.outputs.ecs_cluster_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ env.PROJECT }}-${{ env.ENVIRONMENT }}-cluster" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for ECS services to stabilize
        if: ${{ needs.deploy-backend.result == 'success' }}
        run: |
          for svc in user-service plan-catalog-service order-service notification-service; do
            echo "Waiting for $svc to stabilize..."
            aws ecs wait services-stable \
              --cluster ${{ steps.cluster.outputs.name }} \
              --services "${{ env.PROJECT }}-${{ env.ENVIRONMENT }}-${svc}"
          done

      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Get active URLs from Terraform state
        id: urls
        working-directory: infrastructure
        run: |
          terraform init -input=false > /dev/null
          echo "site=https://$(terraform output -raw cloudfront_domain)" >> "$GITHUB_OUTPUT"
          echo "api=$(terraform output -raw api_gateway_endpoint)" >> "$GITHUB_OUTPUT"
          echo "cognito_pool=$(terraform output -raw cognito_user_pool_id)" >> "$GITHUB_OUTPUT"
          echo "cognito_client=$(terraform output -raw cognito_client_id)" >> "$GITHUB_OUTPUT"

      - name: Deployment summary
        run: |
          echo "## Deploy All — Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Terraform | ${{ needs.terraform.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend   | ${{ needs.deploy-backend.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend  | ${{ needs.build-frontend.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Active URLs" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource | URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend | ${{ steps.urls.outputs.site }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API Gateway | ${{ steps.urls.outputs.api }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cognito Pool ID | \`${{ steps.urls.outputs.cognito_pool }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cognito Client ID | \`${{ steps.urls.outputs.cognito_client }}\` |" >> "$GITHUB_STEP_SUMMARY"
